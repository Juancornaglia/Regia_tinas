<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Conta - Regia & Tinas Care</title>
    <link rel="icon" type="image/png" href="../img/logo_pequena4.png">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../css/home.css">
    
    <style>
        :root { --rosa-pet: #FE8697; }
        .nav-tabs .nav-link.active { color: var(--rosa-pet) !important; font-weight: bold; border-bottom: 3px solid var(--rosa-pet); }
        .nav-link { color: #666; cursor: pointer; }
        .btn-rosa { background-color: var(--rosa-pet); color: white; border: none; border-radius: 20px; padding: 10px 20px; transition: 0.3s; }
        .btn-rosa:hover { background-color: #ff6b81; color: white; transform: scale(1.02); }
        .aba-conteudo { display: none; }
        .aba-conteudo.ativa { display: block; }
        #sessao-cadastro-pet { background: #fffcfc; padding: 20px; border-radius: 15px; margin-top: 15px; border: 1px dashed var(--rosa-pet); }
        .card-fidelidade { background: linear-gradient(45deg, #FE8697, #ffb3ba); color: white; border: none; border-radius: 15px; }
    </style>
</head>
<body>

    <div class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index: 2000">
        <div id="liveToast" class="toast align-items-center text-white bg-dark border-0" role="alert" aria-live="assertive" aria-atomic="true">
            <div class="d-flex">
                <div class="toast-body" id="toast-mensagem"></div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
            </div>
        </div>
    </div>

    <nav class="navbar navbar-expand-lg shadow-sm mb-4" style="background-color: var(--rosa-pet);">
        <div class="container">
            <a class="btn text-white d-flex align-items-center" href="../index.html"><i class="bi bi-arrow-left me-2"></i>Voltar</a>
            <span class="navbar-brand fw-bold text-white mx-auto">Regia & Tinas Care</span>
            
            <div class="d-flex align-items-center">
                <a href="../loja.html" class="btn text-white position-relative me-3">
                    <i class="bi bi-cart3 fs-4"></i>
                    <span id="carrinho-count" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-dark">0</span>
                </a>
                <button id="logout-button" class="btn btn-sm btn-outline-light"><i class="bi bi-box-arrow-right"></i> Sair</button>
            </div>
        </div>
    </nav>

    <main class="container my-5">
        <div class="card card-fidelidade shadow-sm mb-4">
            <div class="card-body d-flex justify-content-between align-items-center p-4">
                <div>
                    <h6 class="mb-0 text-white-50">Seu Saldo de Fidelidade</h6>
                    <h2 class="fw-bold mb-0" id="saldo-fidelidade">0 Pontos</h2>
                </div>
                <i class="bi bi-star-fill fs-1 opacity-50"></i>
            </div>
        </div>

        <ul class="nav nav-tabs mb-4" id="menu-perfil">
            <li class="nav-item"><a class="nav-link active" onclick="mostrarAba('perfil', this)">Meu Perfil</a></li>
            <li class="nav-item"><a class="nav-link" onclick="mostrarAba('pets', this)">Meus Pets</a></li>
            <li class="nav-item"><a class="nav-link" onclick="mostrarAba('agendamentos', this)">Agendamentos</a></li>
        </ul>

        <div class="card p-4 shadow-sm border-0 rounded-4">
            <div id="aba-perfil" class="aba-conteudo ativa">
                <h3>Meu Perfil</h3>
                <form id="form-perfil">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Nome Completo</label>
                        <input type="text" class="form-control" id="nome_completo" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Telefone de Contato</label>
                        <input type="tel" class="form-control" id="telefone" placeholder="(00) 00000-0000">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Email</label>
                        <input type="email" class="form-control bg-light" id="email_display" readonly>
                    </div>
                    <button type="button" id="btnSalvarPerfil" class="btn btn-rosa mt-2">Salvar Alterações</button>
                </form>
            </div>

            <div id="aba-pets" class="aba-conteudo">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h3>Meus Pets</h3>
                    <button class="btn btn-rosa btn-sm" onclick="toggleFormPet()">+ Novo Pet</button>
                </div>
                <div id="lista-pets" class="row g-3 mb-4">
                    <p class="text-muted p-3">Carregando seus pets...</p>
                </div>
                <div id="sessao-cadastro-pet" style="display: none;">
                    <h5 class="mb-3">Cadastrar Novo Pet</h5>
                    <div class="row g-3">
                        <div class="col-md-4"><input type="text" id="nome_pet" class="form-control" placeholder="Nome"></div>
                        <div class="col-md-4"><input type="text" id="especie" class="form-control" placeholder="Espécie"></div>
                        <div class="col-md-4"><input type="text" id="raca" class="form-control" placeholder="Raça"></div>
                        <div class="col-md-4">
                            <select id="porte" class="form-select">
                                <option value="Pequeno">Pequeno</option>
                                <option value="Médio">Médio</option>
                                <option value="Grande">Grande</option>
                            </select>
                        </div>
                        <div class="col-md-8"><input type="text" id="observacoes_pet" class="form-control" placeholder="Obs"></div>
                    </div>
                    <button id="btnSalvarPet" class="btn btn-rosa mt-3 w-100">SALVAR PET</button>
                </div>
            </div>

            <div id="aba-agendamentos" class="aba-conteudo">
                <h3>Meus Agendamentos</h3>
                <div class="table-responsive">
                    <table class="table table-hover align-middle">
                        <thead class="table-light">
                            <tr>
                                <th>Data/Hora</th>
                                <th>Pet</th>
                                <th>Serviço</th>
                                <th>Status</th>
                                <th>Ações</th>
                            </tr>
                        </thead>
                        <tbody id="tabela-meus-agendamentos"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script type="module">
        import { verificarAcesso } from '../js/auth_guard.js';
        
        // Proteção da página
        verificarAcesso('cliente');

        // Atualizar contador global ao carregar
        import { atualizarContadorGlobal } from '../js/loja.js'; // Ajuste o caminho se necessário
        if (window.atualizarContadorGlobal) window.atualizarContadorGlobal();
    </script>

    <script type="module">
    import { verificarAcesso } from '../js/auth_guard.js';
    
    // Garante que pelo menos o usuário esteja logado
    verificarAcesso('cliente'); 
</script>
    <script src="../js/perfil.js" type="module"></script>

    <script>
        function mostrarAba(idAba, elemento) {
            document.querySelectorAll('.aba-conteudo').forEach(aba => aba.classList.remove('ativa'));
            document.querySelectorAll('.nav-link').forEach(link => link.classList.remove('active'));
            document.getElementById('aba-' + idAba).classList.add('ativa');
            elemento.classList.add('active');
        }

        function toggleFormPet() {
            const form = document.getElementById('sessao-cadastro-pet');
            form.style.display = form.style.display === 'block' ? 'none' : 'block';
        }
    </script>
</body>
</html>
