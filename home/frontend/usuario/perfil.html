<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Conta - Regia & Tinas Care</title>
    <link rel="icon" type="image/png" href="../img/logo_pequena4.png">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <style>
        :root { --rosa-pet: #FE8697; }
        body { background-color: #f8f9fa; font-family: 'Poppins', sans-serif; }
        
        .navbar { background-color: var(--rosa-pet) !important; }
        .nav-tabs .nav-link { color: #666; cursor: pointer; border: none; font-weight: 500; }
        .nav-tabs .nav-link.active { color: var(--rosa-pet) !important; font-weight: bold; border-bottom: 3px solid var(--rosa-pet); background: none; }
        
        .btn-rosa { background-color: var(--rosa-pet); color: white; border: none; border-radius: 25px; padding: 10px 25px; transition: 0.3s; font-weight: 600; }
        .btn-rosa:hover { background-color: #ff6b81; color: white; transform: translateY(-2px); }
        
        .aba-conteudo { display: none; animation: fadeIn 0.3s ease; }
        .aba-conteudo.ativa { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        #sessao-cadastro-pet { background: #fffcfc; padding: 25px; border-radius: 15px; margin-top: 15px; border: 2px dashed var(--rosa-pet); }
        .card-fidelidade { background: linear-gradient(45deg, #FE8697, #ffb3ba); color: white; border: none; border-radius: 20px; box-shadow: 0 10px 20px rgba(254, 134, 151, 0.2); }
        
        .pet-mini-card { background: white; border-radius: 12px; padding: 15px; border-left: 5px solid var(--rosa-pet); box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
    </style>
</head>
<body>

    <div class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index: 2000">
        <div id="liveToast" class="toast align-items-center text-white bg-dark border-0" role="alert">
            <div class="d-flex">
                <div class="toast-body" id="toast-mensagem"></div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
            </div>
        </div>
    </div>

    <nav class="navbar navbar-expand-lg shadow-sm mb-4">
        <div class="container">
            <a class="btn text-white d-flex align-items-center fw-bold" href="../index.html"><i class="bi bi-arrow-left me-2"></i>Início</a>
            <span class="navbar-brand fw-bold text-white mx-auto">Minha Conta</span>
            
            <div class="d-flex align-items-center">
                <a href="../loja.html" class="btn text-white position-relative me-3">
                    <i class="bi bi-cart3 fs-4"></i>
                    <span id="carrinho-count" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-dark">0</span>
                </a>
                <button id="logout-button" class="btn btn-sm btn-outline-light rounded-pill px-3">Sair</button>
            </div>
        </div>
    </nav>

    <main class="container my-5">
        <div class="card card-fidelidade p-2 mb-5">
            <div class="card-body d-flex justify-content-between align-items-center p-4">
                <div>
                    <h6 class="mb-1 text-white-50">Bem-vindo(a), <span id="user-greeting" class="text-white fw-bold">...</span></h6>
                    <h2 class="fw-bold mb-0" id="saldo-fidelidade">150 Pontos</h2>
                    <small class="opacity-75">Troque seus pontos por banhos ou descontos!</small>
                </div>
                <i class="bi bi-patch-check-fill display-3 opacity-50"></i>
            </div>
        </div>

        <ul class="nav nav-tabs mb-4" id="menu-perfil">
            <li class="nav-item"><a class="nav-link active" onclick="mostrarAba('perfil', this)">Meu Perfil</a></li>
            <li class="nav-item"><a class="nav-link" onclick="mostrarAba('pets', this)">Meus Pets</a></li>
            <li class="nav-item"><a class="nav-link" onclick="mostrarAba('agendamentos', this)">Agendamentos</a></li>
        </ul>

        <div class="card p-4 p-md-5 shadow-sm border-0 rounded-4 bg-white">
            
            <div id="aba-perfil" class="aba-conteudo ativa">
                <h4 class="fw-bold mb-4">Dados Pessoais</h4>
                <form id="form-perfil">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold small text-muted">Nome Completo</label>
                            <input type="text" class="form-control" id="nome_completo" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold small text-muted">Telefone</label>
                            <input type="tel" class="form-control" id="telefone" placeholder="(00) 00000-0000">
                        </div>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-bold small text-muted">E-mail (Login)</label>
                        <input type="email" class="form-control bg-light" id="email_display" readonly>
                    </div>
                    <button type="button" id="btnSalvarPerfil" class="btn btn-rosa">Salvar Alterações</button>
                </form>
            </div>

            <div id="aba-pets" class="aba-conteudo">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h4 class="fw-bold mb-0">Meus Amiguinhos</h4>
                    <button class="btn btn-rosa btn-sm" onclick="toggleFormPet()">+ Adicionar Pet</button>
                </div>
                
                <div id="lista-pets" class="row g-3 mb-4">
                    </div>

                <div id="sessao-cadastro-pet" style="display: none;">
                    <h5 class="fw-bold mb-3">Novo Cadastro</h5>
                    <form id="form-cadastro-pet">
                        <div class="row g-3">
                            <div class="col-md-4"><input type="text" id="input_nome_pet" class="form-control" placeholder="Nome do Pet" required></div>
                            <div class="col-md-4"><input type="text" id="input_especie" class="form-control" placeholder="Ex: Cão" required></div>
                            <div class="col-md-4"><input type="text" id="input_raca" class="form-control" placeholder="Raça"></div>
                            <div class="col-md-4">
                                <select id="input_porte" class="form-select">
                                    <option value="Pequeno">Porte Pequeno</option>
                                    <option value="Médio" selected>Porte Médio</option>
                                    <option value="Grande">Porte Grande</option>
                                </select>
                            </div>
                            <div class="col-md-8"><input type="text" id="input_obs" class="form-control" placeholder="Alguma observação importante?"></div>
                        </div>
                        <div class="mt-3 text-end">
                            <button type="button" class="btn btn-light me-2" onclick="toggleFormPet()">Cancelar</button>
                            <button type="submit" class="btn btn-rosa">Salvar Pet</button>
                        </div>
                    </form>
                </div>
            </div>

            <div id="aba-agendamentos" class="aba-conteudo">
                <h4 class="fw-bold mb-4">Histórico de Horários</h4>
                <div class="table-responsive">
                    <table class="table table-hover align-middle">
                        <thead class="table-light">
                            <tr>
                                <th>Data/Hora</th>
                                <th>Pet</th>
                                <th>Serviço</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody id="tabela-meus-agendamentos">
                            <tr><td colspan="4" class="text-center p-4 text-muted">Carregando...</td></tr>
                        </tbody>
                    </table>
                </div>
                <div class="text-center mt-3">
                    <a href="../servicos/agendamento-fluxo.html" class="btn btn-outline-primary btn-sm rounded-pill px-4">Novo Agendamento</a>
                </div>
            </div>

        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/perfil.js" type="module"></script>

    <script>
        function mostrarAba(idAba, elemento) {
            document.querySelectorAll('.aba-conteudo').forEach(aba => aba.classList.remove('ativa'));
            document.querySelectorAll('.nav-link').forEach(link => link.classList.remove('active'));
            document.getElementById('aba-' + idAba).classList.add('ativa');
            elemento.classList.add('active');
        }

        function toggleFormPet() {
            const form = document.getElementById('sessao-cadastro-pet');
            form.style.display = form.style.display === 'block' ? 'none' : 'block';
        }
    </script>
</body>
</html>
