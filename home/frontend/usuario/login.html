<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Regia & Tinas Care</title>
    
    <link rel="shortcut icon" href="../img/logo_pequena4.png" type="image/x-icon">
    
    <link href="https://fonts.googleapis.com/css2?family=Ribeye&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inknut+Antiqua&family=Poppins&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <link rel="stylesheet" href="../css/auth.css">

    <style>
        /* CORREÇÃO DO OLHINHO */
        .input-group {
            position: relative;
            margin-bottom: 15px;
        }

        .eye-icon {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #fff; 
            z-index: 10;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
        }

        #senha {
            padding-right: 45px;
        }

        /* AJUSTE DO DIVIDER (OU ACESSE COM) */
        .divider span {
            color: #ffffff !important; /* Cor branca para o texto */
            background-color: transparent !important; /* Remove fundo se houver */
        }

        /* AJUSTE DO ESQUECI MINHA SENHA */
        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            color: white;
            font-size: 0.9rem;
        }

        .forgot-link {
            color: #ffffff !important;
            text-decoration: none;
            font-weight: 500;
        }

        .forgot-link:hover {
            text-decoration: underline;
        }

        /* CORREÇÃO DOS BOTÕES */
        .form-buttons {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
            margin-top: 20px;
        }

        .btn-outline {
            color: #ffffff !important;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-solid {
            background-color: #ffffff;
            color: #FE8697; 
            border: none;
            padding: 10px 25px;
            border-radius: 20px;
            font-weight: bold;
            transition: 0.3s;
            cursor: pointer;
        }

        /* COR DA SETA */
        .back-button i {
            color: white;
            font-size: 1.5rem;
        }
    </style>
</head>
<body>
    <header class="auth-header">Regia & Tinas Care</header>
    <div class="form-container">
        <div class="form-box">
            <div class="form-header">
                <a href="../home.html" class="back-button"><i class="bi bi-arrow-left"></i></a>
                <h1>Acessar sua conta</h1>
            </div>
            
            <form id="loginForm">
                <div class="input-group">
                    <input type="email" id="email" placeholder="Digite seu e-mail" required>
                </div>
                <div class="input-group">
                    <input type="password" id="senha" placeholder="Digite sua senha" required>
                    <i class="bi bi-eye-fill eye-icon" id="togglePassword"></i>
                </div>
                
                <div class="form-options">
                    <label><input type="checkbox" id="remember"> Lembrar</label>
                    <a href="redefinir_senha.html" class="forgot-link">Esqueci minha senha</a>
                </div>
                
                <div class="form-buttons">
                    <a href="criar_conta.html" class="btn-outline">CADASTRAR</a>
                    <button type="submit" class="btn-solid">ACESSAR</button>
                </div>
            </form>

            <div class="divider"><span>Ou acesse com</span></div>

            <div class="social-login">
                <a href="javascript:void(0);" id="btn-google">
                    <img src="../img/google.png" alt="Login com Google">
                </a>
                
                <a href="javascript:void(0);" id="btn-facebook">
                    <img src="../img/facebook.png" alt="Login com Facebook">
                </a>
            </div>
        </div> 
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/login.js?v=1000" type="module"></script>
</body>
</html>
