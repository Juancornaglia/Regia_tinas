<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Regia tinas</title>
    
    <link rel="shortcut icon" href="../img/logo_pequena4.png" type="image/x-icon">
    
    <link href="https://fonts.googleapis.com/css2?family=Ribeye&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inknut+Antiqua&family=Poppins&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <link rel="stylesheet" href="../css/auth.css">

    <style>
        /* CORREÇÃO DO OLHINHO */
        .input-group {
            position: relative;
            margin-bottom: 15px;
        }

        .eye-icon {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #666; /* Cor cinza para o ícone */
            z-index: 10;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
        }

        #senha {
            padding-right: 45px; /* Abre espaço para o olho não ficar em cima do texto */
        }

        /* CORREÇÃO DO BOTÃO CADASTRAR */
        .form-buttons {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
            margin-top: 20px;
        }

        .btn-outline {
            color: #ffffff !important; /* Força a cor branca */
            text-decoration: none;
            font-weight: bold;
            opacity: 1 !important; /* Garante que não fique transparente */
            transition: 0.3s;
        }

        .btn-outline:hover {
            color: #f1f1f1 !important;
            text-decoration: underline !important;
            transform: scale(1.05);
        }

        /* Ajuste do botão Acessar para alinhar com o design */
        .btn-solid {
            background-color: #ffffff;
            color: #FE8697; /* Substitua pela sua cor rosa principal */
            border: none;
            padding: 10px 25px;
            border-radius: 20px;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-solid:hover {
            background-color: #f8f9fa;
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <header class="auth-header">Chateau du Pet</header>
    <div class="form-container">
        <div class="form-box">
            <div class="form-header">
                <a href="../index.html" class="back-button"><i class="bi bi-arrow-left"></i></a>
                <h1>Acessar sua conta</h1>
            </div>
            
            <form id="loginForm">
                <div class="input-group">
                    <input type="email" id="email" placeholder="Digite seu e-mail" required>
                </div>
                <div class="input-group">
                    <input type="password" id="senha" placeholder="Digite sua senha" required>
                    <i class="bi bi-eye-fill eye-icon" id="togglePassword"></i>
                </div>
                
                <div class="form-options">
                    <label><input type="checkbox" id="remember"> Lembrar</label>
                    <a href="redefinir_senha.html">Esqueci minha senha</a>
                </div>
                
                <div class="form-buttons">
                    <a href="criar_conta.html" class="btn btn-outline">CADASTRAR</a>
                    <button type="submit" class="btn btn-solid">ACESSAR</button>
                </div>
            </form>

            <div class="divider"><span>Ou acesse com</span></div>

            <div class="social-login">
                <a href="javascript:void(0);" id="btn-google">
                    <img src="../img/google.png" alt="Login com Google">
                </a>
                
                <a href="javascript:void(0);" id="btn-facebook">
                    <img src="../img/facebook.png" alt="Login com Facebook">
                </a>
            </div>
        </div> 
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/login.js?v=1000" type="module"></script>
</body>
</html>
