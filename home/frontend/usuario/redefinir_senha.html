<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redefinir Senha - Regia & Tinas Care</title>
    
    <link rel="shortcut icon" href="../img/logo_pequena4.png" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Inknut+Antiqua&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <link rel="stylesheet" href="../css/auth.css">

    <style>
        /* PADRONIZAÇÃO DO DESIGN */
        :root {
            --brand-pink: #FE8697;
        }

        .form-box {
            background-color: var(--brand-pink) !important; 
            padding: 40px;
            border-radius: 15px; 
            width: 100%;
            max-width: 450px;
            box-shadow: 0px 10px 25px rgba(0, 0, 0, 0.1);
        }

        .input-group {
            position: relative;
            margin-bottom: 15px;
        }

        .input-group input {
            width: 100%;
            padding: 12px 15px;
            border-radius: 8px;
            border: none;
            outline: none;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        /* Estilo para os ícones de olho */
        .eye-icon {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #666;
            z-index: 10;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
        }

        input[type="password"], input[type="email"], input[type="text"] {
            padding-right: 45px;
        }

        /* Botão Sólido Branco com Texto Rosa */
        .btn-solid {
            background-color: #ffffff;
            color: var(--brand-pink); 
            border: none;
            padding: 12px 25px;
            border-radius: 25px;
            font-weight: bold;
            transition: 0.3s;
            width: 100%;
            margin-top: 10px;
            cursor: pointer;
        }

        .btn-solid:hover {
            background-color: #f8f9fa;
            transform: scale(1.02);
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .step-text {
            text-align: center;
            margin-bottom: 25px;
            color: #ffffff;
            font-size: 0.9rem;
            line-height: 1.4;
        }

        h1 {
            color: #ffffff;
            font-size: 1.5rem;
            margin-bottom: 0;
            font-family: 'Inknut Antiqua', serif;
        }

        .back-button i {
            color: #fff;
            font-size: 1.5rem;
            margin-right: 10px;
        }
        
        .form-header {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
            justify-content: center;
        }
        .form-header .back-button {
            position: absolute;
            left: 30px;
        }
    </style>
</head>
<body>
    <header class="auth-header">Regia & Tinas Care</header>

    <div class="form-container">
        <div class="form-box">

            <div id="reset-section-1"> 
                <div class="form-header position-relative">
                    <a href="login.html" class="back-button"><i class="bi bi-arrow-left"></i></a>
                    <h1>Esqueceu a senha?</h1>
                </div>
                <p class="step-text">Não se preocupe! Digite seu e-mail para receber o código de recuperação.</p>
                
                <form id="sendCodeForm">
                    <div class="input-group">
                        <input type="email" id="email" placeholder="Digite seu e-mail" required>
                    </div>
                    <button type="submit" class="btn btn-solid" id="btnSendCode">ENVIAR CÓDIGO</button>
                </form>
            </div>

            <div id="reset-section-2" style="display: none;"> 
                <div class="form-header position-relative">
                    <a href="#" id="back-to-step1" class="back-button"><i class="bi bi-arrow-left"></i></a>
                    <h1>Redefinir senha</h1>
                </div>
                <p class="step-text">Insira o código de 6 dígitos que geramos e defina sua nova senha.</p>
                
                <form id="resetPasswordForm">
                    <div class="input-group">
                        <input type="text" id="verification_code" placeholder="Código de 6 dígitos (Ex: 123456)" maxlength="6" required style="text-align: center; letter-spacing: 2px; font-weight: bold;">
                    </div>

                    <div class="input-group">
                        <input type="password" id="new_password" placeholder="Nova senha" required>
                        <i class="bi bi-eye-fill eye-icon toggle-password" data-target="new_password"></i>
                    </div>
                    <div class="input-group">
                        <input type="password" id="confirm_new_password" placeholder="Confirme a nova senha" required>
                        <i class="bi bi-eye-fill eye-icon toggle-password" data-target="confirm_new_password"></i>
                    </div>
                    <button type="submit" class="btn btn-solid" id="btnResetPass">SALVAR NOVA SENHA</button>
                </form>
            </div>

        </div> 
    </div>

    <script>
        // Lógica para mostrar/esconder senha
        document.querySelectorAll('.toggle-password').forEach(item => {
            item.addEventListener('click', function() {
                const targetId = this.getAttribute('data-target');
                const input = document.getElementById(targetId);
                
                if (input.type === 'password') {
                    input.type = 'text';
                    this.classList.remove('bi-eye-fill');
                    this.classList.add('bi-eye-slash-fill');
                } else {
                    input.type = 'password';
                    this.classList.remove('bi-eye-slash-fill');
                    this.classList.add('bi-eye-fill');
                }
            });
        });
    </script>

    <script src="../js/redefinir_senha.js" type="module"></script>
</body>
</html>
