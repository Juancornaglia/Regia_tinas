<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redefinir Senha - Chateau du Pet</title>
    
    <link rel="shortcut icon" href="../img/logo_pequena4.png" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Ribeye&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inknut+Antiqua&family=Poppins&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <link rel="stylesheet" href="../css/auth.css">

    <style>
        /* PADRONIZAÇÃO DO DESIGN */
        .input-group {
            position: relative;
            margin-bottom: 15px;
        }

        /* Estilo para os ícones de olho */
        .eye-icon {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #666;
            z-index: 10;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
        }

        input[type="password"] {
            padding-right: 45px;
        }

        /* Botão Sólido (Acessar/Salvar) */
        .btn-solid {
            background-color: #ffffff;
            color: #FE8697; /* Rosa da sua marca */
            border: none;
            padding: 10px 25px;
            border-radius: 20px;
            font-weight: bold;
            transition: 0.3s;
            width: 100%;
            margin-top: 10px;
        }

        .btn-solid:hover {
            background-color: #f8f9fa;
            transform: scale(1.02);
        }

        /* Texto descritivo branco */
        .step-text {
            text-align: center;
            margin-bottom: 25px;
            color: #ffffff;
            font-size: 0.9rem;
            line-height: 1.4;
        }

        h1 {
            color: #ffffff;
            font-size: 1.5rem;
            margin-bottom: 0;
        }
    </style>
</head>
<body>
    <header class="auth-header">Chateau du Pet</header>

    <div class="form-container">
        <div class="form-box">

            <div id="reset-section-1" style="display: none;"> 
                <div class="form-header">
                    <a href="login.html" class="back-button"><i class="bi bi-arrow-left"></i></a>
                    <h1>Esqueceu a senha?</h1>
                </div>
                <p class="step-text">Não se preocupe! Digite seu e-mail para receber o link de recuperação.</p>
                
                <form id="sendCodeForm">
                    <div class="input-group">
                        <input type="email" id="email" placeholder="Digite seu e-mail" required>
                    </div>
                    <button type="submit" class="btn btn-solid">ENVIAR LINK</button>
                </form>
            </div>

            <div id="reset-section-2" style="display: none;"> 
                <div class="form-header">
                    <a href="#" id="back-to-step1" class="back-button"><i class="bi bi-arrow-left"></i></a>
                    <h1>Redefinir senha</h1>
                </div>
                <p class="step-text">Defina sua nova senha abaixo para recuperar o acesso.</p>
                
                <form id="resetPasswordForm">
                    <div class="input-group">
                        <input type="password" id="new_password" placeholder="Nova senha" required>
                        <i class="bi bi-eye-fill eye-icon toggle-password" data-target="new_password"></i>
                    </div>
                    <div class="input-group">
                        <input type="password" id="confirm_new_password" placeholder="Confirme a nova senha" required>
                        <i class="bi bi-eye-fill eye-icon toggle-password" data-target="confirm_new_password"></i>
                    </div>
                    <button type="submit" class="btn btn-solid">SALVAR SENHA</button>
                </form>
            </div>

        </div> 
    </div>

    <script>
        document.querySelectorAll('.toggle-password').forEach(item => {
            item.addEventListener('click', function() {
                const targetId = this.getAttribute('data-target');
                const input = document.getElementById(targetId);
                
                if (input.type === 'password') {
                    input.type = 'text';
                    this.classList.remove('bi-eye-fill');
                    this.classList.add('bi-eye-slash-fill');
                } else {
                    input.type = 'password';
                    this.classList.remove('bi-eye-slash-fill');
                    this.classList.add('bi-eye-fill');
                }
            });
        });
    </script>


    <script src="../js/redefinir_senha.js" type="module"></script>
</body>
</html>
