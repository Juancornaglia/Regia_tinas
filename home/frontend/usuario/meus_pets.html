<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meus Pets - Regia & Tinas Care</title>
    <link rel="icon" type="image/png" href="../img/logo_pequena4.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <style>
        :root { 
            --brand-pink: #FE8697; 
            --brand-pink-hover: #e57585;
            --bg-light: #f8f9fa; 
        }
        body { background-color: var(--bg-light); font-family: 'Poppins', sans-serif; }
        
        .navbar { background-color: var(--brand-pink) !important; }
        .text-brand { color: var(--brand-pink) !important; }
        
        .nav-tabs .nav-link { color: #666; font-weight: 500; border: none; }
        .nav-tabs .nav-link.active { color: var(--brand-pink); border-bottom: 3px solid var(--brand-pink); background: none; }

        .pet-card { 
            border: none; 
            border-radius: 15px; 
            transition: 0.3s; 
            background: white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .pet-card:hover { transform: translateY(-5px); box-shadow: 0 8px 25px rgba(0,0,0,0.1); }
        
        .btn-brand { 
            background-color: var(--brand-pink); 
            color: white; 
            border-radius: 25px; 
            font-weight: bold; 
            border: none;
            padding: 10px 20px;
        }
        .btn-brand:hover { background-color: var(--brand-pink-hover); color: white; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg shadow-sm">
        <div class="container">
            <a class="btn text-white d-flex align-items-center fw-bold" href="../index.html">
                <i class="bi bi-arrow-left me-2"></i>Início
            </a>
            <span class="navbar-brand fw-bold text-white mx-auto">Minha Conta</span>
            <div style="width: 80px;"></div>
        </div>
    </nav>

    <main class="container my-5">
        <ul class="nav nav-tabs mb-5">
            <li class="nav-item"><a class="nav-link" href="perfil.html"><i class="bi bi-person me-2"></i>Perfil</a></li>
            <li class="nav-item"><a class="nav-link active" href="meus_pets.html"><i class="bi bi-dog me-2"></i>Meus Pets</a></li>
            <li class="nav-item"><a class="nav-link" href="meus_agendamentos.html"><i class="bi bi-calendar-check me-2"></i>Agendamentos</a></li>
            <li class="nav-item"><a class="nav-link" href="meus_pedidos.html"><i class="bi bi-bag me-2"></i>Pedidos</a></li>
        </ul>

        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h2 class="fw-bold text-dark">Meus Pets</h2>
                <p class="text-muted">Gerencie os amiguinhos que fazem parte da nossa família.</p>
            </div>
            <button class="btn btn-brand" data-bs-toggle="modal" data-bs-target="#petModal">
                <i class="bi bi-plus-circle me-2"></i>Adicionar Pet
            </button>
        </div>

        <div id="lista-pets" class="row g-4">
            <div class="col-12 text-center py-5">
                <div class="spinner-border text-brand" role="status"></div>
                <p class="mt-2 text-muted">Carregando seus pets...</p>
            </div>
        </div>
    </main>

    <div class="modal fade" id="petModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content border-0 rounded-4">
                <div class="modal-header bg-light border-0">
                    <h5 class="modal-title fw-bold text-brand">Novo Pet</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <form id="formCadastroPet">
                    <div class="modal-body p-4">
                        <div class="mb-3">
                            <label class="form-label fw-bold small">Nome do Pet *</label>
                            <input type="text" id="nome_pet" class="form-control rounded-3" placeholder="Ex: Bob" required>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold small">Espécie *</label>
                                <input type="text" id="especie" class="form-control rounded-3" placeholder="Ex: Cão" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold small">Raça</label>
                                <input type="text" id="raca" class="form-control rounded-3" placeholder="Ex: Golden">
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold small">Porte</label>
                            <select id="porte" class="form-select rounded-3">
                                <option value="Pequeno">Pequeno</option>
                                <option value="Médio" selected>Médio</option>
                                <option value="Grande">Grande</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold small">Observações</label>
                            <textarea id="observacoes" class="form-control rounded-3" rows="3" placeholder="Alergias ou comportamento..."></textarea>
                        </div>
                    </div>
                    <div class="modal-footer border-0">
                        <button type="button" class="btn btn-light rounded-pill px-4" data-bs-dismiss="modal">Cancelar</button>
                        <button type="submit" class="btn btn-brand px-4">Salvar Pet</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <footer class="main-footer pt-5 pb-4 mt-5 border-top bg-white text-center">
        <p class="mb-1 fw-bold text-brand">REGIA & TINA'S CARE</p>
        <p class="small text-muted mb-0">© 2026 - Todos os direitos reservados</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/meus_pets.js" type="module"></script>
</body>
</html>
