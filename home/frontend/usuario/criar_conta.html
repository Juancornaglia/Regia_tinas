<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Conta - Chateau du Pet</title>
    
    <link rel="shortcut icon" href="../img/logo_pequena4.png" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Ribeye&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inknut+Antiqua:wght@400;700&family=Poppins:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <link rel="stylesheet" href="../css/auth.css"> 

<style>
    :root {
        --cor-principal: #FE8697;
        --cor-texto-claro: #ffffff;
    }

    /* Ajuste do container para centralizar o card rosa */
    .form-box {
        background-color: var(--cor-principal) !important; /* Fundo rosa como no Login */
        padding: 40px;
        border-radius: 15px; 
        width: 100%;
        max-width: 450px;
        box-shadow: 0px 10px 25px rgba(0, 0, 0, 0.1);
        position: relative;
    }

    .form-header h1 {
        font-family: 'Inknut Antiqua', serif;
        font-size: 1.5rem;
        color: var(--cor-texto-claro) !important;
        margin: 0;
    }

    .back-button {
        color: var(--cor-texto-claro) !important;
        font-size: 1.5rem;
    }

    /* Estilização dos Inputs */
    .input-group {
        position: relative;
        margin-bottom: 15px;
    }

    .input-group input {
        width: 100%;
        padding: 12px 15px;
        border-radius: 8px;
        border: none;
        outline: none;
        box-sizing: border-box;
    }

    /* Olhinho no padrão corrigido */
    .eye-icon {
        position: absolute;
        right: 15px;
        top: 50%;
        transform: translateY(-50%);
        cursor: pointer;
        color: #666;
        z-index: 10;
        font-size: 1.2rem;
        display: flex;
        align-items: center;
    }

    #senha, #confirmar_senha {
        padding-right: 45px;
    }

    /* Botão no padrão do Login */
    .btn-solid {
        background-color: #ffffff !important;
        color: var(--cor-principal) !important;
        border: none;
        padding: 12px;
        border-radius: 25px;
        font-size: 1rem;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.3s;
        width: 100%;
        margin-top: 10px;
        margin-bottom: 20px;
    }

    .btn-solid:hover {
        background-color: #f8f9fa !important;
        transform: scale(1.02);
    }

    .login-link {
        text-align: center;
        font-size: 0.9rem;
        color: var(--cor-texto-claro);
    }

    .login-link a {
        color: var(--cor-texto-claro);
        text-decoration: none;
        font-weight: bold;
    }

    .login-link a:hover {
        text-decoration: underline;
    }
</style>
</head>
<body>
    
    <header class="auth-header">Chateau du Pet</header>

    <div class="form-container">
        <div class="form-box">
            <div class="form-header">
                <a href="login.html" class="back-button"><i class="bi bi-arrow-left"></i></a>
                <h1>Crie sua conta</h1>
            </div>
            
            <form id="criarContaForm">
                <div class="input-group">
                    <input type="text" id="nome" name="nome" placeholder="Nome completo" required>
                </div>
                <div class="input-group">
                    <input type="email" id="email" name="email" placeholder="Digite seu e-mail" required>
                </div>
                <div class="input-group">
                    <input type="password" id="senha" name="senha" placeholder="Crie uma senha" required>
                    <i class="bi bi-eye-fill eye-icon" id="togglePassword"></i>
                </div>
                <div class="input-group">
                    <input type="password" id="confirmar_senha" name="confirmar_senha" placeholder="Confirme sua senha" required>
                    <i class="bi bi-eye-fill eye-icon" id="toggleConfirmPassword"></i>
                </div>
                
                <button type="submit" class="btn btn-solid">CRIAR CONTA</button>
            </form>

            <div class="login-link">
                <span>Já possui uma conta? <a href="login.html">Entrar</a></span>
            </div>
        </div> 
    </div>

    <script>
        function setupToggle(iconId, inputId) {
            const icon = document.getElementById(iconId);
            const input = document.getElementById(inputId);
            if (icon && input) {
                icon.addEventListener('click', () => {
                    const type = input.type === 'password' ? 'text' : 'password';
                    input.type = type;
                    icon.classList.toggle('bi-eye-fill');
                    icon.classList.toggle('bi-eye-slash-fill');
                });
            }
        }
        setupToggle('togglePassword', 'senha');
        setupToggle('toggleConfirmPassword', 'confirmar_senha');
    </script>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script> 
    
    <script src="../js/criar_conta.js" type="module"></script>
</body>
</html>
