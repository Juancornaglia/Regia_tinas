<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agendamento - Regia & Tinas Care</title>
    <link rel="icon" type="image/png" href="../img/logo_pequena4.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../css/style.css"> <style>
        :root { --brand-pink: #FE8697; --brand-pink-hover: #e57585; --bg-light: #f8f9fa; }
        body { background-color: var(--bg-light); }
        .text-brand { color: var(--brand-pink) !important; }
        .step { display: none; }
        .step.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .progress-bar { background-color: var(--brand-pink); transition: 0.5s; }
        .card-agendamento { border: none; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); background: white; }
        
        /* Calendário */
        #calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
        .calendar-day { padding: 10px; border-radius: 8px; cursor: pointer; text-align: center; font-weight: bold; border: 1px solid #eee; font-size: 0.9rem; }
        .calendar-day:hover:not(.disabled) { background-color: #ffeef0; color: var(--brand-pink); }
        .calendar-day.selected { background-color: var(--brand-pink) !important; color: white !important; }
        .calendar-day.disabled { color: #ccc; cursor: not-allowed; background-color: #fdfdfd; border-color: transparent; }
        .calendar-day-name { font-size: 0.75rem; color: #999; text-transform: uppercase; text-align: center; font-weight: 800; padding-bottom: 5px; }

        .time-slot { width: 100%; margin-bottom: 8px; border-radius: 12px; font-weight: 600; }
        .btn-brand { background-color: var(--brand-pink); color: white; border: none; border-radius: 25px; transition: 0.3s; }
        .btn-brand:hover { background-color: var(--brand-pink-hover); color: white; }
    </style>
</head>
<body>
    <nav class="navbar shadow-sm p-3 mb-4" style="background-color: var(--brand-pink);">
        <div class="container">
            <a class="btn btn-sm btn-outline-light rounded-pill" href="../index.html"><i class="bi bi-arrow-left me-1"></i>Sair</a>
            <span class="navbar-brand fw-bold text-white mx-auto">Regia & Tina's Care</span>
        </div>
    </nav>

    <main class="container my-5">
        <div class="progress mb-4 mx-auto" style="max-width: 600px; height: 8px;">
            <div class="progress-bar" id="step-progressbar" style="width: 20%"></div>
        </div>

        <div id="agendamento-wizard" class="card card-agendamento p-4 p-md-5 mx-auto" style="max-width: 900px;">
            
            <div id="step-1" class="step active">
                <h3 class="fw-bold mb-4">1. O que vamos fazer hoje?</h3>
                <div class="row g-3" id="services-container">
                    </div>
                <div class="text-end mt-4">
                    <button id="btn-next-1" class="btn btn-brand btn-lg px-5" disabled>Próximo</button>
                </div>
            </div>

            <div id="step-2" class="step">
                <h3 class="fw-bold mb-4">2. Onde será o atendimento?</h3>
                <div class="mb-4">
                    <select class="form-select form-select-lg" id="store-select">
                        <option value="" selected disabled>Escolha a unidade...</option>
                    </select>
                </div>
                <div class="d-flex justify-content-between">
                    <button class="btn btn-light rounded-pill px-4 btn-prev">Voltar</button>
                    <button id="btn-next-2" class="btn btn-brand btn-lg px-5" disabled>Próximo</button>
                </div>
            </div>

            <div id="step-3" class="step">
                <h3 class="fw-bold mb-4">3. Escolha o melhor momento</h3>
                <div class="row">
                    <div class="col-md-7 border-end">
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <button id="prevMonth" class="btn btn-sm btn-light rounded-circle"><i class="bi bi-chevron-left"></i></button>
                            <h5 id="calendar-title" class="mb-0 fw-bold text-brand">Maio 2026</h5>
                            <button id="nextMonth" class="btn btn-sm btn-light rounded-circle"><i class="bi bi-chevron-right"></i></button>
                        </div>
                        <div id="calendar-header" class="calendar-day-name row m-0">
                            <div class="col p-0 text-center">Dom</div><div class="col p-0 text-center">Seg</div>
                            <div class="col p-0 text-center">Ter</div><div class="col p-0 text-center">Qua</div>
                            <div class="col p-0 text-center">Qui</div><div class="col p-0 text-center">Sex</div>
                            <div class="col p-0 text-center">Sáb</div>
                        </div>
                        <div id="calendar-grid"></div>
                    </div>
                    <div class="col-md-5 ps-md-4">
                        <h6 class="fw-bold mb-3">Horários Disponíveis</h6>
                        <div id="time-slots-container" class="overflow-auto" style="max-height: 300px;">
                            <p class="text-muted small text-center mt-5">Selecione uma data para ver os horários.</p>
                        </div>
                    </div>
                </div>
                <div class="d-flex justify-content-between mt-4">
                    <button class="btn btn-light rounded-pill px-4 btn-prev">Voltar</button>
                    <button id="btn-next-3" class="btn btn-brand btn-lg px-5" disabled>Próximo</button>
                </div>
            </div>

            <div id="step-4" class="step">
                <h3 class="fw-bold mb-4">4. Quem é o fofinho?</h3>
                <select class="form-select form-select-lg mb-4" id="pet-select"></select>
                <div id="new-pet-form" style="display: none;" class="bg-light p-3 rounded mb-4">
                    <input type="text" id="new-pet-name" class="form-control mb-2" placeholder="Nome do Pet">
                    <input type="text" id="new-pet-raca" class="form-control" placeholder="Raça (ex: Poodle, SRD)">
                </div>
                <div class="d-flex justify-content-between">
                    <button class="btn btn-light rounded-pill px-4 btn-prev">Voltar</button>
                    <button id="btn-next-4" class="btn btn-brand btn-lg px-5">Revisar</button>
                </div>
            </div>

            <div id="step-5" class="step">
                <h3 class="fw-bold mb-4 text-success">Quase lá!</h3>
                <div id="summary-content" class="p-4 rounded-4 border bg-light mb-4"></div>
                <div class="d-flex justify-content-between">
                    <button class="btn btn-light rounded-pill px-4 btn-prev">Voltar</button>
                    <button id="final-confirm" class="btn btn-success btn-lg px-5 fw-bold rounded-pill shadow">Confirmar Agendamento</button>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="../js/agendamento.js"></script>
</body>
</html>
