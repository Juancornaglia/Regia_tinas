<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nossos Produtos - Regia & Tinas Care</title>
    
    <link rel="shortcut icon" href="img/logo_pequena4.png" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <style>
        :root {
            --brand-pink: #FE8697;
            --brand-pink-hover: #e57585;
            --bg-light: #f8f9fa;
        }

        body {
            background-color: var(--bg-light);
            font-family: 'Poppins', sans-serif;
        }

        .bg-brand { background-color: var(--brand-pink) !important; }
        .text-brand { color: var(--brand-pink) !important; }

        .btn-brand {
            background-color: var(--brand-pink);
            color: white;
            font-weight: bold;
            border: none;
            transition: 0.3s;
        }
        .btn-brand:hover {
            background-color: var(--brand-pink-hover);
            color: white;
            transform: translateY(-2px);
        }

        .product-card-hover {
            transition: all 0.3s ease-in-out;
            text-decoration: none;
            color: inherit;
        }
        .product-card-hover:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.1) !important;
        }
    </style>
</head>
<body>

    <header class="bg-brand p-3 shadow-sm">
        <div class="container d-flex justify-content-between align-items-center">
            <a href="index.html" class="h4 text-white text-decoration-none fw-bold mb-0">
                <img src="img/logo_pequena4.png" alt="Logo" style="height: 35px; margin-right: 10px;">
                Regia & Tinas Care
            </a>
            <nav>
                <a href="index.html" class="nav-link text-white d-inline me-3">Home</a>
                <a href="produtos.html" class="nav-link text-white d-inline fw-bold me-3">Produtos</a>
            </nav>
        </div>
    </header>

    <main class="container my-5">
        <div class="d-flex justify-content-between align-items-end mb-4 border-bottom pb-3">
            <h1 class="text-brand fw-bold mb-0">Catálogo de Produtos</h1>
            <span class="text-muted small">Encontre o melhor para o seu pet!</span>
        </div>
        
        <div id="product-list-container" class="row g-4">
            
            <div id="loading-products" class="col-12 text-center p-5">
                <div class="spinner-border text-brand" style="width: 3rem; height: 3rem;" role="status">
                    <span class="visually-hidden">Carregando...</span>
                </div>
                <p class="mt-3 text-muted fw-bold">Buscando produtos...</p>
            </div>

            <div id="no-products" class="col-12 text-center p-5 text-muted" style="display: none;">
                <i class="bi bi-box-seam" style="font-size: 4rem; color: #FE8697;"></i>
                <h4 class="mt-3 fw-bold">Nenhum produto encontrado.</h4>
                <p>Volte novamente mais tarde para conferir as novidades.</p>
            </div>

        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/produtos.js" type="module"></script>

</body>
</html>
