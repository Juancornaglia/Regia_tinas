<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Gerencial - Regia & Tinas Care</title>
    <link rel="icon" type="image/png" href="../img/logo_pequena4.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../css/admin.css">
    <style>
        .brand-pink { color: #FE8697; }
        .mascote-header { font-size: 1.5rem; transition: 0.3s; cursor: pointer; }
        .mascote-header:hover { transform: scale(1.2) rotate(10deg); }
        .dashboard-panel { background: white; border-radius: 15px; padding: 20px; }
    </style>
</head>
<body>

    <aside class="admin-sidebar shadow">
        <div class="sidebar-header text-center">
            <div class="mascote-header mb-2">🐱</div>
            <h4 class="fw-bold">Regia & Tinas</h4>
            <small class="text-white-50">Gestão Estratégica</small>
        </div>
        <ul class="nav flex-column mt-3">
            <li class="nav-item"><a class="nav-link active" href="dashboard.html"><i class="bi bi-grid-1x2-fill me-2"></i>Dashboard</a></li>
            <li class="nav-item"><a class="nav-link" href="gestao_agendamentos.html"><i class="bi bi-calendar-check me-2"></i>Agendamentos</a></li>
            <li class="nav-item"><a class="nav-link" href="gestao_usuarios.html"><i class="bi bi-people-fill me-2"></i>Gestão de Usuários</a></li>
            <li class="nav-item"><a class="nav-link" href="gestao_produtos.html"><i class="bi bi-box-seam me-2"></i>Estoque e Loja</a></li>
            <li class="nav-item"><a class="nav-link" href="cms_editor.html"><i class="bi bi-pencil-square me-2"></i>Editor Visual</a></li>
        </ul>
        <div class="logout-btn-container p-3">
            <button id="logout-button" class="btn btn-danger w-100 btn-sm fw-bold shadow-sm"><i class="bi bi-box-arrow-right me-2"></i>Encerrar Sessão</button>
        </div>
    </aside>

    <main class="admin-main-content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h2 class="fw-bold text-dark mb-0">Visão Geral</h2>
                <p class="text-muted">Bem-vindo ao comando, Zapata.</p>
            </div>
            <button class="btn btn-white shadow-sm border-0" onclick="location.reload()"><i class="bi bi-arrow-clockwise brand-pink me-2"></i>Atualizar</button>
        </div>
        
        <div class="row g-4 mb-4">
            <div class="col-md-3">
                <div class="card border-0 shadow-sm border-start border-success border-4 h-100">
                    <div class="card-body">
                        <h6 class="text-muted small fw-bold">FATURAMENTO</h6>
                        <div id="kpi-vendas" class="fs-4 fw-bold">...</div>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card border-0 shadow-sm border-start border-primary border-4 h-100">
                    <div class="card-body">
                        <h6 class="text-muted small fw-bold">AGENDA HOJE</h6>
                        <div id="kpi-agendamentos" class="fs-4 fw-bold">...</div>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card border-0 shadow-sm border-start border-4 h-100" style="border-left-color: #FE8697 !important;">
                    <div class="card-body">
                        <h6 class="text-muted small fw-bold">PETS ATIVOS</h6>
                        <div id="kpi-pets" class="fs-4 fw-bold">...</div>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card border-0 shadow-sm border-start border-info border-4 h-100">
                    <div class="card-body">
                        <h6 class="text-muted small fw-bold">CLIENTES</h6>
                        <div id="kpi-clientes" class="fs-4 fw-bold">...</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="row g-4">
            <div class="col-lg-8">
                <div class="dashboard-panel shadow-sm">
                    <h5 class="fw-bold mb-3"><i class="bi bi-clock-history brand-pink me-2"></i>Agenda Recente</h5>
                    <div class="table-responsive">
                        <table class="table table-hover">
                            <tbody id="tabela-agendamentos-admin"></tbody>
                        </table>
                    </div>
                </div>
            </div>
            <div class="col-lg-4">
                <div class="dashboard-panel shadow-sm mb-4">
                    <h6 class="fw-bold text-muted small mb-3">RECEITA POR CATEGORIA</h6>
                    <canvas id="graficoFaturamento" height="230"></canvas>
                </div>
                <div class="dashboard-panel shadow-sm border-start border-danger border-4">
                    <h6 class="fw-bold text-danger small mb-3">🚨 ESTOQUE CRÍTICO</h6>
                    <div id="lista-estoque-critico"></div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script type="module" src="../js/admin_dashboard.js"></script>
</body>
</html>
