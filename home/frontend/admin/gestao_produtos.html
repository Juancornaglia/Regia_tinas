<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Produtos - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../css/admin.css">
</head>
<body>

    <aside class="admin-sidebar">
        <div class="sidebar-header">
            <h3>Regia & Tinas Care</h3>
        </div>
        <ul class="nav flex-column">
            <li class="nav-item"><a class="nav-link" href="dashboard.html"><i class="bi bi-grid-fill me-2"></i>Dashboard</a></li>
            <li class="nav-item"><a class="nav-link" href="gestao_agendamentos.html"><i class="bi bi-calendar-check me-2"></i>Agendamentos</a></li>
            <li class="nav-item"><a class="nav-link active" href="gestao_produtos.html"><i class="bi bi-box-seam me-2"></i>Produtos</a></li>
            <li class="nav-item"><a class="nav-link" href="gestao_horarios.html"><i class="bi bi-clock-history me-2"></i>Horários</a></li>
            <li class="nav-item"><a class="nav-link" href="cms_editor.html"><i class="bi bi-pencil-square me-2"></i>Editor Visual</a></li>
        </ul>
        <div class="mt-auto">
            <a class="nav-link logout-link text-white" href="../index.html" target="_blank"><i class="bi bi-eye me-2"></i>Ver site</a>
            <button id="logout-button" class="btn btn-danger btn-sm w-100 mt-2"><i class="bi bi-box-arrow-right"></i> Sair</button>
        </div>
    </aside>

    <main class="admin-main-content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h1>Gestão de Produtos</h1>
                <p class="text-muted">Gerencie o catálogo de produtos da sua loja.</p>
            </div>
            <button id="add-product-button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#productModal">
                <i class="bi bi-plus-circle me-2"></i>Novo Produto
            </button>
        </div>

        <div class="row mb-4">
            <div class="col-md-6">
                <div class="input-group shadow-sm">
                    <span class="input-group-text bg-white border-end-0">
                        <i class="bi bi-search text-muted"></i>
                    </span>
                    <input type="text" id="input-busca" class="form-control border-start-0" placeholder="Buscar por nome ou marca...">
                </div>
            </div>
        </div>

        <div class="table-responsive shadow-sm bg-white rounded">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                    <tr>
                        <th scope="col">ID</th>
                        <th scope="col">Produto</th>
                        <th scope="col">Preço</th>
                        <th scope="col">Estoque</th>
                        <th scope="col" style="width: 120px;">Ações</th>
                    </tr>
                </thead>
                <tbody id="product-table-body">
                    <tr id="loading-row">
                        <td colspan="5" class="text-center p-4">
                            <div class="spinner-border text-primary" role="status"></div>
                            <p class="mt-2">Carregando produtos...</p>
                        </td>
                    </tr>
                    <tr id="no-products-row" style="display: none;">
                        <td colspan="5" class="text-center text-muted p-4">Nenhum produto cadastrado.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <div class="modal fade" id="productModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="productModalLabel">Dados do Produto</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="productForm">
                        <input type="hidden" id="editProductId">
                        <div class="mb-3">
                            <label class="form-label">Nome do Produto *</label>
                            <input type="text" class="form-control" id="nome_produto" required>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Preço (R$) *</label>
                                <input type="number" step="0.01" class="form-control" id="preco" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Quantidade em Estoque *</label>
                                <input type="number" class="form-control" id="quantidade_estoque" required>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">URL da Imagem</label>
                            <input type="url" class="form-control" id="url_imagem" placeholder="https://...">
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Marca</label>
                                <input type="text" class="form-control" id="marca">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Categoria</label>
                                <input type="text" class="form-control" id="tipo_produto" placeholder="Ex: Ração, Brinquedo">
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Descrição</label>
                            <textarea class="form-control" id="descricao" rows="3"></textarea>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="submit" form="productForm" class="btn btn-primary" id="saveProductButton">Salvar Produto</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script> 
<script type="module">
    import { verificarAcesso } from '../js/auth_guard.js';
    
    // Bloqueia a página se não for admin ANTES de carregar qualquer dado
    verificarAcesso('admin'); 
</script>
    <script src="../js/admin_produtos.js" type="module"></script>

    
</body>
</html>
