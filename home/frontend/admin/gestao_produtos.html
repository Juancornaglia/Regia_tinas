<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Produtos - Regia & Tinas Care</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../css/admin.css">

    <style>
        :root {
            --brand-pink: #FE8697;
            --brand-pink-hover: #e57585;
            --bg-light: #f8f9fa;
        }

        body { background-color: var(--bg-light); }
        .admin-main-content { min-height: 100vh; padding: 2rem; }

        .card {
            border: none;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05) !important;
            overflow: hidden;
            background: white;
        }

        .text-brand { color: var(--brand-pink) !important; }
        
        .btn-brand {
            background-color: var(--brand-pink);
            color: white;
            border: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .btn-brand:hover {
            background-color: var(--brand-pink-hover);
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(254, 134, 151, 0.4);
        }

        .btn-outline-brand {
            color: var(--brand-pink);
            border-color: var(--brand-pink);
        }
        .btn-outline-brand:hover {
            background-color: var(--brand-pink);
            color: white;
        }

        .form-control:focus, .form-select:focus {
            border-color: var(--brand-pink);
            box-shadow: 0 0 0 0.25rem rgba(254, 134, 151, 0.25);
        }

        .modal-header.bg-brand {
            background-color: var(--brand-pink);
            color: white;
            border-bottom: none;
        }
    </style>
</head>
<body>

    <aside class="admin-sidebar">
        <div class="sidebar-header">
            <h3>Regia & Tinas Care</h3>
        </div>
        <ul class="nav flex-column">
            <li class="nav-item"><a class="nav-link" href="dashboard.html"><i class="bi bi-grid-fill me-2"></i>Dashboard</a></li>
            <li class="nav-item"><a class="nav-link" href="gestao_agendamentos.html"><i class="bi bi-calendar-check me-2"></i>Agendamentos</a></li>
            <li class="nav-item"><a class="nav-link active" href="gestao_produtos.html"><i class="bi bi-box-seam me-2"></i>Produtos</a></li>
            <li class="nav-item"><a class="nav-link" href="gestao_horarios.html"><i class="bi bi-clock-history me-2"></i>Horários</a></li>
            <li class="nav-item"><a class="nav-link" href="gestao_pedidos.html"><i class="bi bi-cart-check me-2"></i>Pedidos/Vendas</a></li>
            <li class="nav-item"><a class="nav-link" href="cms_editor.html"><i class="bi bi-pencil-square me-2"></i>Editor Visual</a></li>
        </ul>
        <div class="mt-auto">
            <a class="nav-link logout-link text-white mb-2" href="../index.html" target="_blank"><i class="bi bi-box-arrow-left me-2"></i>Ver site</a>
            <button id="logout-button" class="btn btn-danger btn-sm w-100"><i class="bi bi-box-arrow-right me-2"></i>Sair</button>
        </div>
    </aside>

    <main class="admin-main-content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h1 class="text-brand fw-bold">Gestão de Produtos</h1>
                <p class="lead text-muted">Gerencie o catálogo de produtos da sua loja.</p>
            </div>
            <button id="add-product-button" class="btn btn-brand px-4 py-2" data-bs-toggle="modal" data-bs-target="#productModal">
                <i class="bi bi-plus-circle me-2"></i>Novo Produto
            </button>
        </div>

        <div class="row mb-4">
            <div class="col-md-6">
                <div class="input-group shadow-sm">
                    <span class="input-group-text bg-white border-end-0">
                        <i class="bi bi-search text-brand"></i>
                    </span>
                    <input type="text" id="input-busca" class="form-control border-start-0" placeholder="Buscar por nome ou marca...">
                </div>
            </div>
        </div>

        <div class="card shadow-sm bg-white rounded">
            <div class="card-body p-0 table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                        <tr>
                            <th scope="col" class="ps-4">ID</th>
                            <th scope="col">Produto</th>
                            <th scope="col">Preço</th>
                            <th scope="col">Estoque</th>
                            <th scope="col" class="text-center" style="width: 120px;">Ações</th>
                        </tr>
                    </thead>
                    <tbody id="product-table-body">
                        <tr id="loading-row">
                            <td colspan="5" class="text-center p-4">
                                <div class="spinner-border text-brand" role="status"></div>
                                <p class="mt-2 text-muted">Carregando produtos do banco...</p>
                            </td>
                        </tr>
                        <tr id="no-products-row" style="display: none;">
                            <td colspan="5" class="text-center text-muted p-4">Nenhum produto cadastrado.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <div class="modal fade" id="productModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content border-0">
                <div class="modal-header bg-brand">
                    <h5 class="modal-title fw-bold" id="productModalLabel">Dados do Produto</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4">
                    <form id="productForm">
                        <input type="hidden" id="editProductId">
                        <div class="mb-3">
                            <label class="form-label fw-bold text-secondary">Nome do Produto *</label>
                            <input type="text" class="form-control" id="nome_produto" required>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold text-secondary">Preço (R$) *</label>
                                <input type="number" step="0.01" class="form-control" id="preco" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold text-secondary">Estoque *</label>
                                <input type="number" class="form-control" id="quantidade_estoque" required>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold text-secondary">URL da Imagem</label>
                            <input type="url" class="form-control" id="url_imagem" placeholder="https://...">
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold text-secondary">Marca</label>
                                <input type="text" class="form-control" id="marca">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold text-secondary">Categoria</label>
                                <input type="text" class="form-control" id="tipo_produto" placeholder="Ex: Ração, Brinquedo">
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold text-secondary">Descrição</label>
                            <textarea class="form-control" id="descricao" rows="3"></textarea>
                        </div>
                    </form>
                </div>
                <div class="modal-footer bg-light">
                    <button type="button" class="btn btn-secondary px-4" data-bs-dismiss="modal">Cancelar</button>
                    <button type="submit" form="productForm" class="btn btn-brand px-4" id="saveProductButton">Salvar Produto</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script> 
    <script src="../js/admin_produtos.js" type="module"></script>
</body>
</html>
