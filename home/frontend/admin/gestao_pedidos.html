<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Gestão de Pedidos - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../css/admin.css">
</head>
<body>
    <aside class="admin-sidebar">
        <div class="sidebar-header"><h3>Regia & Tinas Care</h3></div>
        <ul class="nav flex-column">
            <li class="nav-item"><a class="nav-link" href="dashboard.html"><i class="bi bi-grid-fill me-2"></i>Dashboard</a></li>
            <li class="nav-item"><a class="nav-link" href="gestao_agendamentos.html"><i class="bi bi-calendar-check me-2"></i>Agendamentos</a></li>
            <li class="nav-item"><a class="nav-link" href="gestao_produtos.html"><i class="bi bi-box-seam me-2"></i>Produtos</a></li>
            <li class="nav-item"><a class="nav-link active" href="gestao_pedidos.html"><i class="bi bi-cart-check me-2"></i>Pedidos/Vendas</a></li>
        </ul>
    </aside>

    <main class="admin-main-content">
        <h1>Vendas e Pedidos</h1>
        <p class="text-muted">Gerencie as compras feitas pelos clientes na loja virtual.</p>

        <div class="table-responsive shadow-sm bg-white rounded">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                    <tr>
                        <th>ID</th>
                        <th>Cliente</th>
                        <th>Total</th>
                        <th>Data</th>
                        <th>Status</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="pedidos-table-body">
                    </tbody>
            </table>
        </div>
    </main>

    <div class="modal fade" id="pedidoModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Detalhes do Pedido #<span id="detalhe-id"></span></h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div id="detalhes-corpo" class="modal-body">
                    </div>
            </div>
        </div>
    </div>

   
</body>
</html>
