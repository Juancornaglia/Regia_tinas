<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Usuários - Regia & Tinas Care</title>
    <link rel="icon" type="image/png" href="../img/logo_pequena4.png">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../css/admin.css">

    <style>
        .user-card { border-radius: 15px; border: none; transition: 0.3s; border-left: 5px solid #FE8697; }
        .user-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .role-badge-funcionario { background-color: #0dcaf0; color: #000; }
        .role-badge-admin { background-color: #dc3545; color: #fff; }
        .role-badge-cliente { background-color: #FE8697; color: #fff; }
        .nav-pills .nav-link.active { background-color: #FE8697; }
        .mascote-fixo { font-size: 2.5rem; position: fixed; bottom: 20px; right: 20px; z-index: 100; cursor: pointer; }
    </style>
</head>
<body>

    <aside class="admin-sidebar shadow">
        <div class="sidebar-header text-center">
            <div class="fs-2">🐱</div>
            <h4 class="fw-bold">Regia & Tinas</h4>
            <small class="text-white-50">Painel de Controle</small>
        </div>
        <ul class="nav flex-column mt-3">
            <li class="nav-item"><a class="nav-link" href="dashboard.html"><i class="bi bi-grid-1x2-fill me-2"></i>Dashboard</a></li>
            <li class="nav-item"><a class="nav-link" href="gestao_agendamentos.html"><i class="bi bi-calendar-check me-2"></i>Agendamentos</a></li>
            <li class="nav-item"><a class="nav-link active" href="gestao_usuarios.html"><i class="bi bi-people-fill me-2"></i>Gestão de Usuários</a></li>
            <li class="nav-item"><a class="nav-link" href="gestao_produtos.html"><i class="bi bi-box-seam me-2"></i>Estoque e Loja</a></li>
        </ul>
        <div class="logout-btn-container p-3">
            <button id="logout-button" class="btn btn-danger w-100 btn-sm"><i class="bi bi-box-arrow-right me-2"></i>Sair</button>
        </div>
    </aside>

    <main class="admin-main-content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h2 class="fw-bold text-dark mb-0">Gestão de Usuários</h2>
                <p class="text-muted">Controle de permissões da tabela <code>public.perfis</code></p>
            </div>
        </div>

        <div class="dashboard-panel mb-4 shadow-sm">
            <div class="input-group input-group-lg">
                <span class="input-group-text bg-white border-end-0"><i class="bi bi-search text-pink"></i></span>
                <input type="text" id="input-busca-inteligente" class="form-control border-start-0" placeholder="Digite nome, e-mail, CPF ou ID do usuário...">
            </div>
            <div class="form-text mt-2 ms-2"><i class="bi bi-magic me-1"></i> A busca filtra automaticamente enquanto você digita.</div>
        </div>

        <ul class="nav nav-pills mb-4" id="pills-tab" role="tablist">
            <li class="nav-item">
                <button class="nav-link active" id="tab-todos" data-bs-toggle="pill" data-role="todos">Todos</button>
            </li>
            <li class="nav-item">
                <button class="nav-link" id="tab-funcionarios" data-bs-toggle="pill" data-role="funcionario">Funcionários</button>
            </li>
            <li class="nav-item">
                <button class="nav-link" id="tab-clientes" data-bs-toggle="pill" data-role="cliente">Clientes</button>
            </li>
        </ul>

        <div class="row g-3" id="lista-usuarios-cards">
            <div class="col-12 text-center py-5">
                <div class="spinner-border text-pink"></div>
                <p class="mt-2 text-muted">Carregando base de usuários...</p>
            </div>
        </div>
    </main>

    <div class="mascote-fixo" title="Oi! Sou o supervisor gatinho.">🐱</div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="../js/gestao_usuarios.js"></script>
</body>
</html>
