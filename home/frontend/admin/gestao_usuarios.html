<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Usuários - Regia & Tinas Care</title>
    <link rel="icon" type="image/png" href="../img/logo_pequena4.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../css/admin.css">
    <style>
        .user-card { transition: 0.3s; border-left: 5px solid #ddd; }
        .user-card.role-admin { border-left-color: #dc3545; }
        .user-card.role-funcionario { border-left-color: #0dcaf0; }
        .user-card.role-cliente { border-left-color: #FE8697; }
        .search-badge { font-size: 0.7rem; vertical-align: middle; }
    </style>
</head>
<body>

    <aside class="admin-sidebar shadow">
        <div class="sidebar-header text-center">
            <img src="../img/logo_pequena4.png" width="40" class="mb-2">
            <h4>Painel Administrativo</h4>
        </div>
        <ul class="nav flex-column">
            <li class="nav-item"><a class="nav-link" href="dashboard.html"><i class="bi bi-grid-1x2-fill me-2"></i>Dashboard</a></li>
            <li class="nav-item"><a class="nav-link active" href="gestao_usuarios.html"><i class="bi bi-people-fill me-2"></i>Gestão de Usuários</a></li>
            <li class="nav-item"><a class="nav-link" href="gestao_agendamentos.html"><i class="bi bi-calendar-check me-2"></i>Agendamentos</a></li>
            <li class="nav-item"><a class="nav-link" href="gestao_produtos.html"><i class="bi bi-box-seam me-2"></i>Produtos e Estoque</a></li>
        </ul>
        <div class="logout-btn-container p-3">
            <button id="logout-button" class="btn btn-danger w-100 btn-sm"><i class="bi bi-box-arrow-right me-2"></i>Sair</button>
        </div>
    </aside>

    <main class="admin-main-content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h2 class="fw-bold">Gestão de Usuários</h2>
                <p class="text-muted">Controle de acesso, cargos e informações da base.</p>
            </div>
            <div class="text-end d-none d-md-block">
                <span class="badge bg-light text-dark p-2 border">
                    <i class="bi bi-cat me-2"></i>Sistema Online
                </span>
            </div>
        </div>

        <div class="dashboard-panel mb-4">
            <div class="input-group input-group-lg shadow-sm">
                <span class="input-group-text bg-white border-end-0"><i class="bi bi-search text-pink"></i></span>
                <input type="text" id="busca-inteligente" class="form-control border-start-0" placeholder="Busque por Nome, E-mail ou CPF...">
            </div>
            <div id="status-busca" class="form-text mt-2 ms-1">Digite para filtrar em tempo real...</div>
        </div>

        <ul class="nav nav-pills mb-4" id="pills-tab" role="tablist">
            <li class="nav-item"><button class="nav-link active" id="tab-todos" data-bs-toggle="pill" data-role="todos">Todos</button></li>
            <li class="nav-item"><button class="nav-link" id="tab-funcionarios" data-bs-toggle="pill" data-role="funcionario">Equipe</button></li>
            <li class="nav-item"><button class="nav-link" id="tab-clientes" data-bs-toggle="pill" data-role="cliente">Clientes</button></li>
        </ul>

        <div class="row g-3" id="lista-usuarios-container">
            <div class="text-center py-5">
                <div class="spinner-border text-pink"></div>
                <p class="mt-2 text-muted">Sincronizando com Banco Neon...</p>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="../js/gestao_usuarios.js"></script>
</body>
</html>
