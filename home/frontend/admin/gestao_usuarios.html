<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Usuários - Regia & Tinas Care</title>
    <link rel="icon" type="image/png" href="../img/logo_pequena4.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../css/admin.css">
    <style>
        .user-card { border-radius: 12px; border: none; border-left: 5px solid #FE8697; transition: 0.3s; }
        .user-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .role-funcionario { border-left-color: #0dcaf0; }
        .role-admin { border-left-color: #dc3545; }
        .section-title { color: #2c3e50; font-weight: 700; border-bottom: 2px solid #eee; padding-bottom: 10px; margin-top: 30px; }
        .search-header { position: sticky; top: 0; background: #f8f9fc; z-index: 10; padding-bottom: 15px; }
    </style>
</head>
<body>

    <aside class="admin-sidebar shadow">
        <div class="sidebar-header text-center">
            <div class="fs-2">🐱</div>
            <h4 class="fw-bold">Regia & Tinas</h4>
        </div>
        <ul class="nav flex-column mt-3">
            <li class="nav-item"><a class="nav-link" href="dashboard.html"><i class="bi bi-grid-1x2-fill me-2"></i>Dashboard</a></li>
            <li class="nav-item"><a class="nav-link" href="gestao_agendamentos.html"><i class="bi bi-calendar-check me-2"></i>Agendamentos</a></li>
            <li class="nav-item"><a class="nav-link active" href="gestao_usuarios.html"><i class="bi bi-people-fill me-2"></i>Gestão de Usuários</a></li>
            <li class="nav-item"><a class="nav-link" href="gestao_produtos.html"><i class="bi bi-box-seam me-2"></i>Estoque e Loja</a></li>
        </ul>
        <div class="p-3"><button id="logout-button" class="btn btn-danger w-100 btn-sm">Sair</button></div>
    </aside>

    <main class="admin-main-content">
        <div class="search-header">
            <h2 class="fw-bold mb-3">Gestão de Pessoas</h2>
            
            <div class="input-group input-group-lg shadow-sm">
                <span class="input-group-text bg-white border-end-0"><i class="bi bi-search brand-pink"></i></span>
                <input type="text" id="input-busca-inteligente" class="form-control border-start-0 border-end-0" placeholder="Nome, e-mail ou CPF...">
                <button class="btn btn-dark px-4" id="btn-buscar-manual">Buscar</button>
            </div>
        </div>

        <h4 class="section-title"><i class="bi bi-shield-shaded me-2 text-primary"></i>Equipe (Admin & Funcionários)</h4>
        <div class="row g-3" id="lista-equipe"></div>

        <h4 class="section-title"><i class="bi bi-person-heart me-2 text-pink" style="color: #FE8697;"></i>Base de Clientes</h4>
        <div class="row g-3" id="lista-clientes"></div>

        <div class="modal fade" id="modalPromover" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content border-0 rounded-4">
                    <div class="modal-header bg-light border-0">
                        <h5 class="modal-title fw-bold text-dark"><i class="bi bi-briefcase me-2"></i>Dados do Novo Funcionário</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <form id="formPromover">
                        <div class="modal-body p-4">
                            <p class="text-muted small mb-4">Para promover este cliente à equipe, precisamos dos dados contratuais.</p>
                            <div class="mb-3">
                                <label class="form-label fw-bold small">Especialidade / Cargo *</label>
                                <input type="text" id="promover_especialidade" class="form-control" required placeholder="Ex: Esteticista Pet">
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold small">Salário Base (R$) *</label>
                                <input type="number" id="promover_salario" class="form-control" required placeholder="2500.00" step="0.01">
                            </div>
                        </div>
                        <div class="modal-footer border-0">
                            <button type="button" class="btn btn-light rounded-pill px-4" data-bs-dismiss="modal" onclick="carregarUsuarios()">Cancelar</button>
                            <button type="submit" class="btn btn-dark rounded-pill px-4">Confirmar Promoção</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="../js/gestao_usuarios.js"></script>
</body>
</html>
