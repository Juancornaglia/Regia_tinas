<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalhes do Produto - Regia & Tinas Care</title>
    <link rel="icon" type="image/png" href="img/logo_pequena4.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <style>
        :root {
            --brand-pink: #FE8697;
            --brand-pink-hover: #e57585;
            --bg-light: #f8f9fa;
        }
        body { background-color: var(--bg-light); }
        .bg-brand { background-color: var(--brand-pink) !important; }
        .text-brand { color: var(--brand-pink) !important; }
        
        .btn-brand {
            background-color: var(--brand-pink);
            color: white;
            font-weight: bold;
            border: none;
            transition: 0.3s;
        }
        .btn-brand:hover {
            background-color: var(--brand-pink-hover);
            color: white;
            transform: translateY(-2px);
        }

        .btn-outline-brand {
            color: var(--brand-pink);
            border-color: var(--brand-pink);
        }
        .btn-outline-brand:hover {
            background-color: var(--brand-pink);
            color: white;
        }

        .product-main-img {
            max-width: 100%;
            height: auto;
            max-height: 400px;
            object-fit: contain;
            border-radius: 12px;
            background: white;
            padding: 1rem;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg bg-brand shadow-sm">
        <div class="container">
            <a class="btn text-white d-flex align-items-center fw-bold" href="javascript:history.back()">
                <i class="bi bi-arrow-left me-2"></i>Voltar
            </a>
            <a class="navbar-brand fw-bold text-white mx-auto" href="index.html">Detalhes do Produto</a>
            <div style="width: 80px;"></div> </div>
    </nav>

    <main class="container my-5">
        <div id="product-detail-container" class="row bg-white p-4 rounded-4 shadow-sm align-items-center">
            <div class="col-12 text-center py-5">
                <div class="spinner-border text-brand" role="status" style="width: 3rem; height: 3rem;"></div>
                <p class="mt-3 text-muted fw-bold">Buscando produto...</p>
            </div>
        </div>

        <div class="row mt-4">
            <div class="col-12">
                <div class="accordion shadow-sm" id="product-info-accordion">
                    </div>
            </div>
        </div>
    </main>

    <section class="container my-5">
        <h3 class="mb-4 fw-bold text-secondary border-bottom pb-2">Produtos Relacionados</h3>
        <div id="related-products-container" class="row row-cols-2 row-cols-md-4 g-4">
            </div>
    </section>

    <footer class="main-footer pt-5 pb-4 bg-dark text-white mt-5">
        <div class="container">
            <div class="text-center small text-white-50">
                <p class="mb-1">REGIA & TINA'S CARE | CNPJ: 10.864.846/0001-23</p>
                <p class="mb-0">© Copyright 2026 - Todos os direitos reservados.</p>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/produto.js" type="module"></script>
</body>
</html>
