<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalhes do Produto - Regia & Tinas Care</title>
    
    <link rel="shortcut icon" href="img/logo_pequena4.png" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <style>
        :root {
            --brand-pink: #FE8697;
            --brand-pink-hover: #e57585;
            --bg-light: #f8f9fa;
        }

        body {
            background-color: var(--bg-light);
            font-family: 'Poppins', sans-serif;
        }

        /* Cores do menu superior */
        .bg-brand {
            background-color: var(--brand-pink);
        }

        #product-image {
            width: 100%;
            height: auto;
            max-height: 450px;
            object-fit: contain;
            border-radius: 12px;
            background-color: white;
            padding: 1rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .text-brand { color: var(--brand-pink) !important; }

        .btn-brand {
            background-color: var(--brand-pink);
            color: white;
            font-weight: bold;
            border: none;
            transition: 0.3s;
        }
        .btn-brand:hover {
            background-color: var(--brand-pink-hover);
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(254, 134, 151, 0.4);
        }

        .btn-outline-brand {
            color: var(--brand-pink);
            border-color: var(--brand-pink);
            font-weight: bold;
            transition: 0.3s;
        }
        .btn-outline-brand:hover {
            background-color: var(--brand-pink);
            color: white;
        }
    </style>
</head>
<body>

    <header class="bg-brand p-3 shadow-sm">
        <div class="container d-flex justify-content-between align-items-center">
            <a href="index.html" class="h4 text-white text-decoration-none fw-bold mb-0">
                <img src="img/logo_pequena4.png" alt="Logo" style="height: 35px; margin-right: 10px;">
                Regia & Tinas Care
            </a>
            <nav>
                <a href="index.html" class="nav-link text-white d-inline me-3">Home</a>
                <a href="index.html" class="nav-link text-white d-inline fw-bold me-3">Produtos</a>
            </nav>
        </div>
    </header>

    <main class="container my-5">
        <div id="product-detail-content" class="bg-white p-4 p-md-5 rounded-4 shadow-sm">

            <div id="loading-product" class="text-center p-5">
                <div class="spinner-border text-brand" role="status" style="width: 3rem; height: 3rem;"></div>
                <p class="mt-3 text-muted fw-bold">Buscando detalhes do produto...</p>
            </div>

            <div id="product-not-found" class="alert alert-warning text-center" style="display: none;">
                <i class="bi bi-search" style="font-size: 3rem; color: #FE8697;"></i>
                <h4 class="alert-heading mt-3 fw-bold">Produto Não Encontrado</h4>
                <p>O produto que você está tentando ver não existe ou foi removido.</p>
                <a href="index.html" class="btn btn-brand mt-2 px-4">Voltar para a Loja</a>
            </div>

            <div id="product-data" class="row g-5 align-items-center" style="display: none;">
                
                <div class="col-md-5 text-center">
                    <img id="product-image" src="img/placeholder.png" alt="Imagem do produto" onerror="this.onerror=null; this.src='img/logo_pequena4.png'">
                </div>

                <div class="col-md-7">
                    <span class="badge bg-light text-secondary mb-2 border">ID: <span id="product-id-badge"></span></span>
                    
                    <h1 id="product-name" class="fw-bold mb-1">Carregando...</h1>
                    <p class="text-muted mb-4">Marca: <span id="product-brand" class="fw-bold text-dark">...</span></p>
                    
                    <h2 id="product-price" class="text-brand fw-bold mb-4" style="font-size: 2.5rem;">R$ 0,00</h2>
                    
                    <h5 class="fw-bold text-secondary border-bottom pb-2">Detalhes do Produto</h5>
                    <p id="product-description" class="text-muted mt-3" style="white-space: pre-wrap; line-height: 1.6;">Carregando descrição...</p>

                    <div class="d-grid gap-3 mt-5">
                        <button class="btn btn-brand btn-lg rounded-pill">
                            <i class="bi bi-cart-plus me-2"></i> Adicionar ao Carrinho
                        </button>
                        <a href="servicos/agendamento-fluxo.html" class="btn btn-outline-brand btn-lg rounded-pill">
                            <i class="bi bi-calendar-check me-2"></i> Agendar Serviço para o Pet
                        </a>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script src="js/produto_detalhe.js" type="module"></script>

</body>
</html>
