<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nossas Unidades - Regia & Tinas Care</title>
    <link rel="icon" type="image/png" href="img/logo_pequena4.png">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <style>
        :root { --brand-pink: #FE8697; --brand-pink-hover: #e57585; --bg-light: #f8f9fa; }
        body { background-color: var(--bg-light); font-family: 'Poppins', sans-serif; }

        .navbar { background-color: var(--brand-pink) !important; padding: 12px 0; }
        .text-brand { color: var(--brand-pink) !important; }

        /* Card de Unidade Premium */
        .store-card { 
            border: none; border-radius: 20px; background: white; 
            overflow: hidden; transition: 0.3s; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            margin-bottom: 2.5rem;
        }
        .store-card:hover { transform: translateY(-5px); box-shadow: 0 15px 35px rgba(0,0,0,0.1); }
        
        /* O Mapa ocupa 100% da altura da coluna no desktop */
        .map-container { height: 100%; min-height: 300px; width: 100%; border: none; }
        
        .btn-maps { 
            background-color: var(--brand-pink); color: white; border: none; 
            border-radius: 30px; font-weight: 700; padding: 12px 25px;
            transition: 0.3s; text-decoration: none; display: inline-block;
        }
        .btn-maps:hover { background-color: var(--brand-pink-hover); color: white; transform: scale(1.03); }

        .info-unidade { padding: 40px; }
        
        @media (max-width: 768px) {
            .info-unidade { padding: 25px; }
            .map-container { min-height: 250px; }
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg shadow-sm sticky-top">
        <div class="container d-flex justify-content-between align-items-center">
            <a class="btn text-white p-0" href="index.html">
                <i class="bi bi-arrow-left-short" style="font-size: 2.5rem;"></i>
            </a>
            <span class="navbar-brand text-white fw-bold">NOSSAS UNIDADES</span>
            <div style="width: 40px;"></div>
        </div>
    </nav>

    <main class="container my-5">
        <div class="text-center mb-5">
            <h1 class="fw-bold mb-2">Onde encontrar a gente 🐾</h1>
            <p class="text-muted fs-5">Escolha a unidade mais próxima e venha nos visitar!</p>
        </div>

        <div id="lista-unidades" class="row justify-content-center">
             </div>
    </main>

    <footer class="text-center py-5 mt-5 bg-white border-top">
        <p class="text-muted mb-0 small">© 2026 Regia & Tinas Care - Qualidade e Carinho em cada detalhe.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/loja.js"></script> </body>
</html>
