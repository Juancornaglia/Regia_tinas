<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loja - Regia & Tinas Care</title>
    <link rel="icon" type="image/png" href="img/logo_pequena4.png">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <style>
        :root { 
            --brand-pink: #FE8697; 
            --brand-pink-hover: #e57585;
            --bg-light: #f8f9fa; 
        }
        
        body { background-color: var(--bg-light); font-family: 'Poppins', sans-serif; }

        /* Navbar */
        .navbar { background-color: var(--brand-pink) !important; padding: 12px 0; }
        .navbar-brand { font-weight: bold; letter-spacing: 1px; }

        /* Botões */
        .btn-brand { background-color: var(--brand-pink); color: white; border: none; border-radius: 25px; font-weight: 600; transition: 0.3s; }
        .btn-brand:hover { background-color: var(--brand-pink-hover); color: white; transform: scale(1.05); }

        /* Cards */
        .product-card { 
            border: none; border-radius: 20px; transition: 0.3s; background: white; height: 100%; overflow: hidden; 
        }
        .product-card:hover { transform: translateY(-8px); box-shadow: 0 12px 30px rgba(0,0,0,0.08); }
        
        .card-img-container { height: 200px; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .card-img-container img { max-height: 100%; max-width: 100%; object-fit: contain; }

        .badge-cart { background-color: #333 !important; }

        /* Barra de busca arredondada */
        .search-container .input-group { border-radius: 30px; overflow: hidden; border: 2px solid #eee; }
        .search-container input { border: none; }
        .search-container input:focus { box-shadow: none; }
    </style>
</head>
<body>

    <div class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index: 2000">
        <div id="liveToast" class="toast align-items-center text-white bg-dark border-0" role="alert" aria-live="assertive" aria-atomic="true">
            <div class="d-flex">
                <div class="toast-body" id="toast-mensagem"></div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
            </div>
        </div>
    </div>

    <div class="offcanvas offcanvas-end" tabindex="-1" id="carrinhoLateral">
        <div class="offcanvas-header border-bottom">
            <h5 class="offcanvas-title fw-bold"><i class="bi bi-cart3 me-2 text-brand"></i>Seu Carrinho</h5>
            <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
        </div>
        <div class="offcanvas-body">
            <div id="itens-carrinho">
                <p class="text-center text-muted mt-5">Seu carrinho está vazio.</p>
            </div>
        </div>
        <div class="offcanvas-footer p-3 border-top bg-light">
            <div class="d-flex justify-content-between mb-3 px-2">
                <span class="fw-bold">Total:</span>
                <span id="carrinho-total" class="fw-bold text-brand fs-5">R$ 0,00</span>
            </div>
            <button class="btn btn-brand w-100 py-2 fw-bold" onclick="finalizarCompra()">Finalizar Pedido</button>
        </div>
    </div>

    <nav class="navbar navbar-expand-lg shadow-sm sticky-top">
        <div class="container d-flex justify-content-between align-items-center">
            <a class="btn text-white p-0" href="index.html">
                <i class="bi bi-arrow-left-short" style="font-size: 2.5rem;"></i>
            </a>

            <span class="navbar-brand text-white">REGIA & TINAS STORE</span>

            <button class="btn text-white position-relative p-0" data-bs-toggle="offcanvas" data-bs-target="#carrinhoLateral">
                <i class="bi bi-cart3 fs-3"></i>
                <span id="carrinho-count" class="position-absolute top-0 start-100 translate-middle badge rounded-pill badge-cart">0</span>
            </button>
        </div>
    </nav>

    <main class="container my-4">
        <div id="bannerLoja" class="carousel slide shadow-sm mb-5" data-bs-ride="carousel">
            <div class="carousel-inner rounded-4">
                <div class="carousel-item active">
                    <div class="p-5 text-white d-flex align-items-center" style="background: linear-gradient(45deg, #FE8697, #ffb3ba); min-height: 250px;">
                        <div class="col-md-7">
                            <h2 class="fw-bold">Tudo para o seu Pet! 🐾</h2>
                            <p>As melhores marcas de ração e acessórios com entrega rápida.</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="row mb-5 justify-content-center search-container">
            <div class="col-md-6">
                <div class="input-group input-group-lg shadow-sm bg-white">
                    <span class="input-group-text bg-white border-0 text-muted"><i class="bi bi-search"></i></span>
                    <input type="text" id="input-busca-loja" class="form-control border-0" placeholder="O que seu pet precisa hoje?">
                </div>
            </div>
        </div>

        <div id="vitrine-produtos" class="row g-4">
            <div class="text-center p-5">
                <div class="spinner-border text-brand" role="status"></div>
                <p class="mt-3 text-muted fw-bold">Buscando os melhores produtos...</p>
            </div>
        </div>
    </main>

    <footer class="text-center py-5 mt-5 bg-white border-top">
        <p class="text-muted mb-0 small">© 2026 Regia & Tinas Care - Qualidade em cada detalhe.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/loja.js" type="module"></script>
</body>
</html>
