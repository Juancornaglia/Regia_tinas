<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resultados da Busca - Regia & Tinas Care</title>
    
    <link rel="icon" type="image/png" href="img/logo_pequena4.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <style>
        :root { 
            --chateau-pink: #FE8697; 
            --chateau-pink-hover: #e57585;
            --chateau-light: #f8f9fa; 
        }

        body { background-color: var(--chateau-light); color: #333; font-family: 'Poppins', Arial, sans-serif; }
        
        /* --- Navbar --- */
        .navbar { background-color: var(--chateau-pink) !important; padding: 0.8rem 1rem; }
        .search-form { 
            position: relative; 
            background: white;
            border-radius: 25px; 
            overflow: hidden; 
            flex-grow: 1; 
            max-width: 600px;
        }
        .search-form input { border: none; padding: 0.6rem 1.5rem; width: 100%; outline: none; }
        .btn-search { 
            background: transparent; 
            border: none; 
            position: absolute; 
            right: 15px; 
            top: 50%; 
            transform: translateY(-50%); 
            color: var(--chateau-pink);
            font-weight: bold;
        }

        /* --- Sidebar de Filtros --- */
        .filter-title { font-weight: bold; color: var(--chateau-pink); margin-bottom: 1.2rem; border-bottom: 2px solid #eee; padding-bottom: 0.5rem; }
        .filter-section h5 { font-size: 1rem; font-weight: 700; margin-bottom: 0.8rem; color: #555; }
        .form-check-input:checked { background-color: var(--chateau-pink); border-color: var(--chateau-pink); }

        /* --- Card de Produto --- */
        .product-card { 
            border: none; 
            transition: transform 0.3s, box-shadow 0.3s; 
            border-radius: 12px; 
            background: #fff;
        }
        .product-card:hover { 
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.08) !important; 
        }
        .card-img-container { height: 200px; display: flex; align-items: center; justify-content: center; padding: 15px; }
        .card-img-top { max-height: 100%; max-width: 100%; object-fit: contain; }
        
        .card-title { 
            font-size: 1rem; 
            font-weight: bold; 
            min-height: 2.8rem;
            display: -webkit-box; 
            -webkit-line-clamp: 2; 
            line-clamp: 2;
            -webkit-box-orient: vertical; 
            overflow: hidden; 
        }

        .btn-custom { 
            background-color: var(--chateau-pink); 
            color: white; 
            border-radius: 25px; 
            font-weight: bold; 
            border: none;
            transition: 0.3s;
        }
        .btn-custom:hover { background-color: var(--chateau-pink-hover); color: white; transform: scale(1.02); }

        /* --- Footer --- */
        .main-footer { background-color: #343a40; padding: 2rem 0; color: white; margin-top: 4rem; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg sticky-top shadow-sm">
        <div class="container">
            <a class="btn text-white fw-bold me-3" href="index.html">
                <i class="bi bi-arrow-left me-2"></i>Início
            </a>
            
            <form class="d-flex mx-auto search-form shadow-sm" action="busca.html" method="GET">
                <input type="search" name="q" id="search-input-bar" placeholder="O que seu pet precisa hoje?" aria-label="Pesquisar">
                <button class="btn-search" type="submit"><i class="bi bi-search"></i></button>
            </form>

            <div class="d-flex align-items-center">
                <a class="text-white ms-3 position-relative" href="carrinho.html" title="Carrinho">
                    <i class="bi bi-cart3 fs-4"></i>
                </a>
            </div>
        </div>
    </nav>

    <main class="container my-5">
        <div class="row">
            <aside class="col-lg-3 d-none d-lg-block"> 
                <div class="bg-white p-4 rounded-4 shadow-sm">
                    <h3 class="filter-title">Filtros</h3>
                    
                    <div class="filter-section mb-4">
                        <h5>Categoria</h5>
                        <div id="category-filters" class="ps-2">
                            <div class="spinner-border spinner-border-sm text-secondary" role="status"></div>
                        </div>
                    </div>

                    <div class="filter-section mb-4">
                        <h5>Marca</h5>
                        <div id="brand-filters" class="ps-2">
                            <div class="spinner-border spinner-border-sm text-secondary" role="status"></div>
                        </div>
                    </div>

                    <div class="filter-section mb-2">
                        <h5>Preço</h5>
                        <div class="d-flex gap-2 mb-3">
                            <input type="number" id="price-min" class="form-control form-control-sm border" placeholder="Mín">
                            <input type="number" id="price-max" class="form-control form-control-sm border" placeholder="Máx">
                        </div>
                        <button id="apply-price-filter" class="btn btn-sm btn-outline-secondary w-100 fw-bold rounded-pill">Aplicar</button>
                    </div>
                </div>
            </aside>
            
            <section class="col-lg-9 mt-4 mt-lg-0">
                <div class="bg-white p-4 rounded-4 shadow-sm mb-4 d-flex justify-content-between align-items-center border-start border-5" style="border-color: var(--chateau-pink) !important;">
                    <div>
                        <h1 class="h4 mb-1 fw-bold">Buscando por: <span id="search-term-display" class="text-secondary">...</span></h1>
                        <p id="results-count" class="text-muted small mb-0 fw-bold">Contando resultados...</p>
                    </div>
                </div>
                
                <div id="search-results-container" class="row row-cols-1 row-cols-sm-2 row-cols-md-3 g-4">
                    <div class="col-12 text-center py-5">
                        <div class="spinner-border" style="color: var(--chateau-pink); width: 3rem; height: 3rem;" role="status"></div>
                        <p class="mt-3 text-muted fw-bold">Procurando os melhores produtos...</p>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <footer class="main-footer">
        <div class="container text-center">
            <p class="mb-1 fw-bold">REGIA & TINA'S CARE | CNPJ: 10.864.846/0001-23</p>
            <p class="text-white-50 mb-0 small">© Copyright 2026 - Todos os direitos reservados.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/busca.js" type="module"></script>

</body>
</html>
