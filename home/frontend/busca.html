<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resultados da Busca - Chateau du Pet</title>
    
    <link rel="icon" type="image/png" href="img/logo_peuqena4.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <style>
        :root { 
            --chateau-pink: #FE8697; 
            --chateau-light: #f8f9fa; 
        }

        body { background-color: var(--chateau-light); color: #333; font-family: 'Poppins', Arial, sans-serif; }
        
        /* --- Navbar --- */
        .navbar { background-color: var(--chateau-pink) !important; padding: 0.6rem 1rem; }
        .search-form { 
            position: relative; 
            background: white;
            border-radius: 25px; 
            overflow: hidden; 
            flex-grow: 1; 
            max-width: 600px;
        }
        .search-form input { border: none; padding: 0.5rem 1.5rem; width: 100%; outline: none; }
        .btn-search { 
            background: transparent; 
            border: none; 
            position: absolute; 
            right: 15px; 
            top: 50%; 
            transform: translateY(-50%); 
            color: var(--chateau-pink);
        }

        /* --- Sidebar de Filtros --- */
        .filter-title { font-weight: bold; color: var(--chateau-pink); margin-bottom: 1.2rem; }
        .filter-section h5 { font-size: 1rem; font-weight: 700; margin-bottom: 0.8rem; }
        .form-check-input:checked { background-color: var(--chateau-pink); border-color: var(--chateau-pink); }

        /* --- Card de Produto (Ajustado) --- */
        .product-card { 
            border: 1px solid #eee; 
            transition: transform 0.3s, box-shadow 0.3s; 
            border-radius: 12px; 
            background: #fff;
        }
        .product-card:hover { 
            transform: translateY(-50px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.08); 
        }
        .card-img-container { height: 180px; display: flex; align-items: center; justify-content: center; padding: 15px; }
        .card-img-top { max-height: 100%; max-width: 100%; object-fit: contain; }
        
        .card-title { 
            font-size: 1rem; 
            font-weight: 600; 
            min-height: 2.8rem;
            display: -webkit-box; 
            -webkit-line-clamp: 2; 
            line-clamp: 2; /* Correção para o aviso do VS Code */
            -webkit-box-orient: vertical; 
            overflow: hidden; 
        }

        .btn-custom { 
            background-color: var(--chateau-pink); 
            color: white; 
            border-radius: 20px; 
            font-weight: bold; 
            border: none;
            transition: 0.3s;
        }
        .btn-custom:hover { background-color: #ff6b81; color: white; }

        /* --- Footer --- */
        .main-footer { background-color: #fff; border-top: 1px solid #eee; padding: 3rem 0; }
        .footer-cta { background-color: var(--chateau-pink); border-radius: 12px; padding: 2rem; color: white; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg sticky-top shadow-sm">
        <div class="container">
            <a class="btn text-white fw-bold" href="javascript:history.back()">
                <i class="bi bi-arrow-left me-2"></i>Voltar
            </a>
            
            <form class="d-flex mx-auto search-form" action="busca.html" method="GET">
                <input type="search" name="q" id="search-input-bar" placeholder="O que seu pet precisa hoje?" aria-label="Pesquisar">
                <button class="btn-search" type="submit"><i class="bi bi-search"></i></button>
            </form>

            <div class="d-flex align-items-center">
                <a class="text-white ms-3 position-relative" href="carrinho.html">
                    <i class="bi bi-cart3 fs-4"></i>
                </a>
            </div>
        </div>
    </nav>

    <main class="container my-5">
        <div class="row">
            <aside class="col-lg-3 d-none d-lg-block"> 
                <h3 class="filter-title">Filtros</h3>
                
                <div class="filter-section mb-4">
                    <h5>Categoria</h5>
                    <div id="category-filters" class="ps-2">
                        <div class="spinner-border spinner-border-sm text-secondary" role="status"></div>
                    </div>
                </div>

                <div class="filter-section mb-4">
                    <h5>Marca</h5>
                    <div id="brand-filters" class="ps-2">
                        <div class="spinner-border spinner-border-sm text-secondary" role="status"></div>
                    </div>
                </div>

                <div class="filter-section mb-4">
                    <h5>Preço</h5>
                    <div class="d-flex gap-2 mb-2">
                        <input type="number" id="price-min" class="form-control form-control-sm" placeholder="Mín">
                        <input type="number" id="price-max" class="form-control form-control-sm" placeholder="Máx">
                    </div>
                    <button id="apply-price-filter" class="btn btn-sm btn-outline-secondary w-100">Aplicar</button>
                </div>
            </aside>
            
            <section class="col-lg-9">
                <div class="mb-4">
                    <h1 class="h3">Resultados para: <span id="search-term-display" class="text-secondary fw-light">...</span></h1>
                    <p id="results-count" class="text-muted small"></p>
                </div>
                
                <div id="search-results-container" class="row row-cols-1 row-cols-sm-2 row-cols-md-3 g-4">
                    <div class="col-12 text-center py-5">
                        <div class="spinner-border text-pink" style="color: var(--chateau-pink)" role="status"></div>
                        <p class="mt-2 text-muted">Procurando os melhores produtos...</p>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <footer class="main-footer">
        <div class="container text-center">
            <div class="footer-cta mb-5">
                <h4 class="mb-3">Ainda com dúvidas?</h4>
                <a href="contato.html" class="btn btn-light rounded-pill px-4 fw-bold">Fale Conosco</a>
            </div>
            <p class="text-muted mb-0 small">© 2026 CHATEAU DU PET - CNPJ: 10.864.846/0001-23</p>
        </div>
    </footer>

    <div class="toast-container position-fixed bottom-0 end-0 p-3">
        <div id="liveToast" class="toast align-items-center text-white bg-dark border-0" role="alert" aria-live="assertive" aria-atomic="true">
            <div class="d-flex">
                <div class="toast-body" id="toast-mensagem"></div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/utils.js"></script> 
    <script src="js/busca.js" type="module"></script>

</body>
</html>
